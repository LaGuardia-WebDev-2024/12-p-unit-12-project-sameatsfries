<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>You Can Think Pad</h1>
    <hr />
    
    <!-- Math Question 1 -->
    <form id="math1-form">
      <label>
        <strong>do you have arachnaphobia</strong><br>
        <select id="math1-answer">
          <option value="math11">na</option>
          <option value="math12">na</option>
          <option value="math13">ye</option>
          <option value="math14">na</option>
        </select>
      </label>
      <button type="submit">if you said ye im warning you now</button>
    </form>
    <div id="math1-result">
      <p id="math1-text"></p>
      <img id="spider" src="https://tse4.mm.bing.net/th/id/OIP.xFXe1qLNBBYv6ny9rdBM5QHaE8?rs=1&pid=ImgDetMain&o=7&rm=3"/>

    </div>
    <hr />
    <!-- Math Question 2 -->
    <form id="math2-form">
      <label>
        <strong>what insect will it bee</strong><br>
        <select id="math2-answer">
          <option value="math21">wasp 😂</option>
          <option value="math22">bee ;)</option>
          <option value="math23">bee :(</option>
          <option value="math24">:(</option>
        </select>
      </label>
      <button type="submit">What will it Bee</button>
    </form>
    <div id="math2-result">
      <p id="math2-text"></p>
<img id="img-b" src="https://www.pestend.ca/wp-content/uploads/2018/04/Bumble-Bees-1.jpg"/>


    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>



      //========================Math Question 1 jQuery Code
      $("#math1-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#math1-answer");
        var answer = $answer.val();

        if (answer === "math13") {



          $("#math1-text").hide().fadeIn().text("NICE");
          $("#spider").show()
        } 
        else {
          $("#math1-text").text("not yet there");
        }
      });

      //=======================Math Question 2 jQuery Code
      $("#math2-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#math2-answer");
        var answer = $answer.val();

        if (answer === "math22") {
          $("#math2-text").animate({
    "font-size": '+=10px',
    height: '+=150px',
    width: '+=150px'
  }).text("NICE");
$("#img-b").show()


        } 
        else {
          $("#math2-text").text("you dont like jazz :(  ");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
